{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>Регистрация</h1>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form action="/auth/register" method="post" class="form">
        <div class="form-group">
            <label for="full_name">Полное имя</label>
            <input type="text" id="full_name" name="full_name" required autofocus placeholder="Иван Иванов">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" required placeholder="Минимум 6 символов" minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Зарегистрироваться</button>
    </form>
    <p class="auth-link">Уже есть аккаунт? <a href="/auth/login">Войти</a></p>
</div>
{% endblock %}
