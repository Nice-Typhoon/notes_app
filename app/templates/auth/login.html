{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>Вход в систему</h1>

    {% if registered %}
    <div class="alert alert-success">Регистрация прошла успешно! Войдите в систему.</div>
    {% endif %}

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form action="/auth/login" method="post" class="form">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autofocus placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Войти</button>
    </form>
    <p class="auth-link">Нет аккаунта? <a href="/auth/register">Зарегистрироваться</a></p>
</div>
{% endblock %}
