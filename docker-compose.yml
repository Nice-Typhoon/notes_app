version: "3.9"

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/notes.db
      SECRET_KEY: change-me-in-production-please
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app  # hot-reload in development
      - ./data:/app/data
